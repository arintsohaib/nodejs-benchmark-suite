schemaVersion: 1
id: pnpm-workspace-benchmark
description: >
  [benchmark] Standard official profile for template pnpm-workspace (tiny). Cold install,
  recursive typecheck, and recursive build with pnpm only. Network required for install.
  Not run in default CI; use for publishable local/lab comparisons of multi-package graphs.
workload:
  template: pnpm-workspace
  size: tiny
  seed: 1
matrix:
  packageManager: [pnpm]
stages:
  - id: install
    action: packageManager.install
    cache: cold
    network: true
    timeoutMs: 300000
  - id: typecheck
    action: project.typecheck
    cache: warm
    timeoutMs: 180000
  - id: build
    action: project.build
    cache: warm
    timeoutMs: 300000
iterations:
  warmup: 0
  measured: 1
runner:
  type: native
metrics:
  collectors:
    - wall
reporting:
  formats:
    - json
    - markdown
    - html
